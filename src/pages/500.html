<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Server error - DeCoders Creative Digital Agency">
    <meta name="robots" content="noindex, follow">
    
    <title>500 - Server Error | DeCoders</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎨%3C/text%3E%3C/svg%3E">
    
    <!-- Preload Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="src/styles/main.css">
    <style>
        body {
            background: var(--gradient-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <main class="error-page" id="main-content">
        <div class="error-content">
            <div class="error-code">500</div>
            <h1 class="error-title">Server Error</h1>
            <p class="error-message">Something went wrong on our end. Our team has been notified and is working on fixing the issue.</p>
            <div class="hero-actions" style="justify-content: center;">
                <a href="index.html" class="btn btn-primary">Go Home</a>
                <button class="btn btn-outline" onclick="window.location.reload()">Try Again</button>
            </div>
            
            <!-- Contact Support -->
            <div style="margin-top: 3rem; padding: 1.5rem; background: rgba(30,30,30,0.6); border-radius: 12px; max-width: 400px; margin-left: auto; margin-right: auto;">
                <p style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 1rem;">Need immediate assistance?</p>
                <a href="mailto:support@wickret.com" class="btn btn-outline" style="display: inline-block; text-decoration: none;">
                    Contact Support
                </a>
            </div>
        </div>
    </main>
</body>
</html>
